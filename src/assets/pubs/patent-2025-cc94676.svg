<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" role="img" aria-label="Processes for the Preparation of Substituted 3-((3-Aminophenyl)amino)piperidine-2,6-dione Compounds">
  <!-- background -->
  <rect width="850" height="1100" fill="#fafaf7"/>

  <!-- top accent band -->
  <rect x="0" y="0" width="850" height="14" fill="#5a4a2a"/>

  <!-- nameplate -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" letter-spacing="3" fill="#5a4a2a" font-weight="600">
    <text x="80" y="80">US PATENT</text>
  </g>
  <line x1="80" y1="100" x2="770" y2="100" stroke="#5a4a2a" stroke-width="1.5"/>

  <!-- label / year row -->
  <g font-family="Inter, system-ui, sans-serif" font-size="20" letter-spacing="2" fill="#4a6585">
    <text x="80" y="160">PATENT</text>
    <text x="770" y="160" text-anchor="end">2025</text>
  </g>

  <!-- title -->
  <g font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-size="56" font-weight="600" fill="#13243d">
    <text x="80" y="380" style="line-height:1.05"><tspan x="80" dy="0">Processes for the Preparation of</tspan><tspan x="80" dy="70">Substituted</tspan><tspan x="80" dy="70">3-((3-Aminophenyl)amino)piperidine-2,6-dione</tspan><tspan x="80" dy="70">Compounds</tspan></text>
  </g>

  <!-- authors -->
  <g font-family="'Source Serif 4', Georgia, serif" font-size="28" font-style="italic" fill="#2a4060">
    <text x="80" y="710">G. Beutner, R. Carrasquillo, W. P. Gallagher, M. Geherty, J. Han, K…</text>
  </g>

  <!-- bottom block: journal + year -->
  <line x1="80" y1="960" x2="770" y2="960" stroke="#c8d2df" stroke-width="1"/>
  <g font-family="Inter, system-ui, sans-serif" font-size="22" fill="#2a4060">
    <text x="80" y="1010" font-weight="500">2025  ·  App. 19/201,806</text>
  </g>

  <!-- subtle DP monogram bottom-right -->
  <g font-family="'Source Serif 4', Georgia, serif" font-size="28" fill="#9eaec1" font-weight="600">
    <text x="770" y="1010" text-anchor="end">DP</text>
  </g>
</svg>